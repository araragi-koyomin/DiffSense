<div class="detail-page">
  <div class="detail-hero">
    <div class="detail-hero-left">
      <span class="hash-large">{{fullHash}}</span>
      <div class="detail-meta-row">
        <span class="meta-pill">{{author}}</span>
        <span class="meta-divider">&middot;</span>
        <span class="meta-pill">{{date}}</span>
        <span class="meta-divider">&middot;</span>
        <span class="meta-pill model-pill">{{model}}</span>
        <span class="meta-pill token-pill">{{tokensUsed}} tokens</span>
      </div>
    </div>
    <div class="detail-hero-right">
      {{{ghLink}}}
    </div>
  </div>

  {{{truncatedWarning}}}

  <div class="detail-grid">
    <div class="detail-main">
      <div class="detail-section">
        <div class="section-label">摘要</div>
        <div class="section-body summary-body">{{summary}}</div>
      </div>

      <div class="detail-section">
        <div class="section-label">意图</div>
        <div class="section-body">{{intent}}</div>
      </div>

      <div class="detail-section">
        <div class="section-label">风险</div>
        <div class="section-body"><span class="risk-badge {{riskClass}}">{{risk}}</span></div>
      </div>
    </div>

    <div class="detail-side">
      <div class="detail-section">
        <div class="section-label">原始提交消息</div>
        <div class="section-body msg-body">{{message}}</div>
      </div>

      <div class="detail-section">
        <div class="section-label">影响范围</div>
        <div class="section-body">{{{scopeTags}}}</div>
      </div>
    </div>
  </div>

  <div class="detail-section">
    <div class="section-label">文件变更</div>
    <div class="file-change-list">{{{fileChanges}}}</div>
  </div>
</div>

<p style="margin-top:1.5rem;"><a href="/" class="btn btn-secondary">&larr; 返回列表</a></p>
