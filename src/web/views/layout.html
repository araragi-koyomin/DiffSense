<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiffSense — 代码变更语义解释器</title>
  <script src="https://unpkg.com/htmx.org@2.0.4" crossorigin="anonymous"></script>
  <style>
    :root {
      --geist-foreground: #171717;
      --geist-background: #ffffff;
      --accents-1: #fafafa; --accents-2: #eaeaea;
      --accents-3: #d4d4d4; --accents-5: #737373;
      --accents-8: #262626;
      --geist-error: #e00; --geist-success: #0070f3;
      --geist-radius: 6px;
      --font-mono: 'SF Mono','Fira Code','Cascadia Code',monospace;
      --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:var(--font-sans); color:var(--geist-foreground); background:var(--geist-background); line-height:1.6; max-width:960px; margin:0 auto; padding:2rem 1.5rem; }
    nav { display:flex; gap:1.5rem; padding-bottom:1rem; border-bottom:1px solid var(--accents-2); margin-bottom:2rem; }
    nav a { color:var(--accents-5); text-decoration:none; font-size:0.9rem; font-weight:500; }
    nav a:hover, nav a.active { color:var(--geist-foreground); }
    nav a.active { border-bottom:2px solid var(--geist-foreground); }
    .card { background:var(--geist-background); border:1px solid var(--accents-2); border-radius:var(--geist-radius); padding:1.25rem; margin-bottom:1rem; display:flex; align-items:flex-start; gap:0.75rem; }
    .card:hover { border-color:var(--accents-3); }
    .hash { font-family:var(--font-mono); font-size:0.8rem; color:var(--geist-success); background:#f0f5ff; padding:0.15rem 0.4rem; border-radius:3px; }
    .summary-line { font-size:1rem; margin:0.5rem 0; }
    .meta { font-size:0.8rem; color:var(--accents-5); }
    .btn { display:inline-block; padding:0.4rem 1rem; background:var(--geist-foreground); color:var(--geist-background); border:none; border-radius:var(--geist-radius); font-size:0.85rem; cursor:pointer; text-decoration:none; }
    .btn:hover { background:var(--accents-8); }
    .btn-secondary { background:var(--accents-1); color:var(--geist-foreground); border:1px solid var(--accents-2); }
    .btn-secondary:hover { background:var(--accents-2); }
    .search-bar { display:flex; gap:0.5rem; margin-bottom:1.5rem; }
    .search-bar input { flex:1; padding:0.5rem 0.75rem; border:1px solid var(--accents-2); border-radius:var(--geist-radius); font-size:0.9rem; outline:none; }
    .search-bar input:focus { border-color:var(--geist-success); }
    .pagination { display:flex; gap:0.5rem; justify-content:center; align-items:center; margin-top:1.5rem; }
    .page-indicator { font-size:0.85rem; color:var(--accents-5); }
    .risk-low { color:#007c40; } .risk-mid { color:#d4a111; } .risk-high { color:var(--geist-error); }
    .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; margin-bottom:2rem; }
    .stat-card { background:var(--accents-1); border:1px solid var(--accents-2); border-radius:var(--geist-radius); padding:1.25rem; text-align:center; }
    .stat-value { font-size:2rem; font-weight:700; color:var(--geist-foreground); }
    .stat-label { font-size:0.8rem; color:var(--accents-5); margin-top:0.25rem; }
    .chart-container { margin:1.5rem 0; }
    .scope-tag { display:inline-block; background:var(--accents-1); border:1px solid var(--accents-2); border-radius:3px; padding:0.15rem 0.5rem; font-size:0.75rem; font-family:var(--font-mono); margin:0.15rem; }
    .card-check { display:flex; align-items:center; padding-top:0.15rem; }
    .card-check input { width:16px; height:16px; accent-color:var(--geist-foreground); cursor:pointer; }
    .card-body { flex:1; }
    .card.selected { border-color:var(--geist-foreground); background:var(--accents-1); }
    .batch-bar { display:flex; align-items:center; gap:1rem; padding:0.75rem 1rem; background:var(--geist-foreground); color:var(--geist-background); border-radius:var(--geist-radius); margin-bottom:1rem; position:sticky; top:0; z-index:10; }
    .batch-bar .btn { background:var(--geist-background); color:var(--geist-foreground); }
    .batch-bar .btn-secondary { background:var(--accents-3); color:var(--geist-foreground); border:1px solid var(--accents-5); }
    .progress-bar { background:var(--accents-2); border-radius:var(--geist-radius); height:6px; margin-bottom:1rem; position:relative; }
    .progress-fill { background:var(--geist-foreground); height:100%; border-radius:var(--geist-radius); transition:width 0.3s; }
    .progress-text { position:absolute; right:0; top:-1.4rem; font-size:0.75rem; color:var(--accents-5); }
    .branch-badge { display:inline-block; padding:0.1rem 0.4rem; border:1px solid; border-radius:3px; font-size:0.65rem; vertical-align:middle; }
    .scope-mini { display:inline-block; background:var(--accents-1); border:1px solid var(--accents-2); border-radius:3px; padding:0.1rem 0.35rem; font-size:0.65rem; font-family:var(--font-mono); margin-right:0.2rem; }
    .gh-link { font-size:0.8rem; color:var(--accents-5); text-decoration:none; margin-left:0.25rem; }
    .gh-link:hover { color:var(--geist-foreground); }
    .card-top { display:flex; align-items:center; gap:0.35rem; flex-wrap:wrap; margin-bottom:0.3rem; }
    .branch-bar { display:flex; gap:0.35rem; flex-wrap:wrap; margin-bottom:1rem; }
    .branch-btn { display:inline-block; padding:0.2rem 0.6rem; font-size:0.75rem; border:1px solid var(--accents-2); border-radius:var(--geist-radius); text-decoration:none; color:var(--accents-5); cursor:pointer; }
    .branch-btn:hover { border-color:var(--geist-foreground); color:var(--geist-foreground); }
    .branch-btn.active { border-color:var(--geist-foreground); color:var(--geist-foreground); background:var(--accents-1); }
    .top-actions { display:flex; justify-content:flex-end; margin-bottom:1rem; }
    .card-analyzed { border-left:3px solid var(--accents-3); }
    .card-unanalyzed { opacity:0.75; }
    .card-unanalyzed:hover { opacity:1; }
    .status-badge { display:inline-block; padding:0.1rem 0.4rem; border-radius:3px; font-size:0.65rem; vertical-align:middle; }
    .status-badge.analyzed { background:#e6f4ea; color:#007c40; }
    .status-badge.unanalyzed { background:var(--accents-1); color:var(--accents-5); }
    footer { margin-top:3rem; padding-top:1rem; border-top:1px solid var(--accents-2); font-size:0.8rem; color:var(--accents-5); text-align:center; }

    /* detail page */
    .detail-hero { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:2rem; padding-bottom:1.5rem; border-bottom:1px solid var(--accents-2); }
    .detail-hero-left { flex:1; min-width:0; }
    .detail-hero-right { flex-shrink:0; }
    .hash-large { font-family:var(--font-mono); font-size:1.25rem; font-weight:600; color:var(--geist-success); background:#f0f5ff; padding:0.3rem 0.6rem; border-radius:var(--geist-radius); display:inline-block; margin-bottom:0.75rem; letter-spacing:0.5px; }
    .detail-meta-row { display:flex; align-items:center; gap:0.35rem; flex-wrap:wrap; }
    .meta-pill { font-size:0.8rem; color:var(--accents-5); }
    .meta-divider { color:var(--accents-3); margin:0 0.1rem; }
    .model-pill { font-family:var(--font-mono); font-size:0.7rem; background:var(--accents-1); padding:0.15rem 0.45rem; border-radius:3px; color:var(--accents-5); }
    .token-pill { font-size:0.7rem; background:var(--accents-1); padding:0.15rem 0.45rem; border-radius:3px; color:var(--accents-5); }
    .detail-grid { display:grid; grid-template-columns:1.5fr 1fr; gap:1.5rem; margin-bottom:1.5rem; }
    .detail-main, .detail-side { display:flex; flex-direction:column; gap:1.25rem; }
    .detail-section { background:var(--geist-background); border:1px solid var(--accents-2); border-radius:var(--geist-radius); overflow:hidden; }
    .section-label { font-size:0.7rem; font-weight:600; text-transform:uppercase; letter-spacing:0.8px; color:var(--accents-5); padding:0.5rem 1rem; background:var(--accents-1); border-bottom:1px solid var(--accents-2); }
    .section-body { padding:1rem; font-size:0.9rem; line-height:1.7; }
    .summary-body { font-size:1.05rem; color:var(--geist-foreground); }
    .msg-body { font-family:var(--font-mono); font-size:0.8rem; color:var(--accents-5); white-space:pre-wrap; word-break:break-word; }
    .risk-badge { display:inline-block; padding:0.3rem 0.7rem; border-radius:var(--geist-radius); font-weight:600; font-size:0.85rem; }
    .risk-badge.risk-low { background:#e6f4ea; color:#007c40; }
    .risk-badge.risk-mid { background:#fef3c7; color:#92400e; }
    .risk-badge.risk-high { background:#fce4ec; color:#c62828; }
    .btn-gh { font-size:0.8rem; white-space:nowrap; }

    /* file change list */
    .file-change-list { border:1px solid var(--accents-2); border-radius:var(--geist-radius); overflow:hidden; }
    .file-change-item { display:flex; align-items:center; gap:0.5rem; padding:0.4rem 0.75rem; font-family:var(--font-mono); font-size:0.8rem; border-bottom:1px solid var(--accents-1); }
    .file-change-item:last-child { border-bottom:none; }
    .file-status { width:1.2rem; text-align:center; font-weight:600; font-size:0.75rem; }
    .file-add .file-status { color:#007c40; }
    .file-del .file-status { color:var(--geist-error); }
    .file-rename .file-status { color:#d4a111; }
    .file-mod .file-status { color:var(--accents-5); }
    .file-path { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .file-stats { color:var(--accents-5); font-size:0.75rem; white-space:nowrap; }

    @media (max-width:640px) { body { padding:1rem; } .detail-grid { grid-template-columns:1fr; } .detail-hero { flex-direction:column; gap:1rem; } }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="{{activeList}}">摘要列表</a>
    <a href="/stats" class="{{activeStats}}">统计</a>
  </nav>
  <main>{{{content}}}</main>
  <footer>DiffSense v1.0 &middot; AI-powered code change interpreter</footer>
</body>
</html>
